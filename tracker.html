<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8"/>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />
  
  <title>TrueTrackr</title>

  <link rel="stylesheet" href="tracker.css"/>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

  <div class="app">

    <!-- HEADER -->
    <div class="top-header">

      <div>
        <h1>TrueTrackr</h1>
<p id="welcomeText">
  Track your money smarter.
</p>
      </div>

      <div class="status-pill">
        LIVE
      </div>

    </div>

    <!-- TOP -->
    <div class="top-stats">

      <!-- BALANCE -->
      <div class="card balance-card">

        <div class="balance-head">

          <div>
            <p>Total Balance</p>
            <h1 id="balance">₹0</h1>
          </div>

        </div>

        <!-- TREND -->
        <div class="mini-chart">
          <canvas id="trendChart"></canvas>
        </div>

        <!-- INCOME -->
        <div class="progress-block">

          <div class="progress-label">
            <span>Income</span>
            <span id="income">₹0</span>
          </div>

          <div class="progress-bar">
            <div
              class="progress-fill income-fill"
              id="incomeFill"
            ></div>
          </div>

        </div>

        <!-- EXPENSE -->
        <div class="progress-block">

          <div class="progress-label">
            <span>Expense</span>
            <span id="expense">₹0</span>
          </div>

          <div class="progress-bar">
            <div
              class="progress-fill expense-fill"
              id="expenseFill"
            ></div>
          </div>

        </div>

      </div>

      <!-- SIDE -->
      <div class="small-cards">

        <div class="card income-card">
          <p>Income</p>
          <h2 id="incomeSmall">₹0</h2>
        </div>

        <div class="card expense-card">
          <p>Expense</p>
          <h2 id="expenseSmall">₹0</h2>
        </div>

      </div>

    </div>

    <!-- INPUT + HISTORY -->
    <div class="middle-section">

      <!-- INPUT -->
      <div class="card input-card">

        <h3>Add Transaction</h3>

        <div class="input-group">
          <input
            id="text"
            placeholder="Transaction Name"
          />
        </div>

        <div class="input-group">
          <input
            id="amount"
            type="number"
            placeholder="Amount"
          />
        </div>

        

        <!-- BUTTONS -->
        <div class="button-group">

          <button onclick="addTransaction('income')">
            Add Income
          </button>

          <button onclick="addTransaction('expense')">
            Add Expense
          </button>

        </div>

      </div>

      <!-- HISTORY -->
      <div class="card transaction-card">

        <div class="history-head">

          <h3>History</h3>

          <span>
            <span id="transactionCount">0</span>
            Transactions
          </span>

        </div>

        <ul id="list"></ul>

      </div>

    </div>

    <!-- INSIGHTS -->
    <div class="insight-grid">

      <div class="card insight-card">

        <h4>Top Category</h4>

        <p id="topCategory">
          No data
        </p>

      </div>

      <div class="card insight-card">

        <h4>Savings Rate</h4>

        <p id="savingRate">
          0%
        </p>

      </div>

      <div class="card insight-card">

        <h4>Financial Status</h4>

        <p id="financialHealth">
          Stable
        </p>

      </div>

    </div>

    <!-- ANALYTICS -->
    <div class="analytics-section">

      <div class="card chart-card">

        <h3>Expense Breakdown</h3>

        <div class="chart-container">
          <canvas id="expenseChart"></canvas>
        </div>

      </div>

      <div class="card chart-card">

        <h3>Income vs Expense</h3>

        <div class="chart-container">
          <canvas id="financeChart"></canvas>
        </div>

      </div>

    </div>

  </div>

  <script src="js/tracker.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/analytics.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
